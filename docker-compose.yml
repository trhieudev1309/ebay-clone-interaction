version: "3.9"

services:
  nginx:
    image: nginx:latest
    container_name: nginx-lb
    ports:
      - "80:80"
    depends_on:
      - app1
      - app2
      - app3
      - redis
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - app-network
    
  app1:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: app1
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - Redis__ConnectionString=redis:6379
    networks:
      - app-network

  app2:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: app2
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - Redis__ConnectionString=redis:6379
    networks:
      - app-network

  app3:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: app3
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - Redis__ConnectionString=redis:6379
    networks:
      - app-network

  redis:
    image: redis:7
    container_name: redis-chat
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - app-network

volumes:
  redis_data:

networks:
  app-network: